<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — The Grimoire</title>
  <link rel="stylesheet" href="../css/grimoire.css"/>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: calc(var(--nav-h) + 2rem);
    }
    .login-box {
      background: var(--ink-2);
      border: 1px solid rgba(201,151,42,0.2dm_cod);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }
    .login-logo {
      text-align: center;
      font-family: var(--font-fraktur);
      font-size: 2.5rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201,151,42,0.4);
      margin-bottom: 0.25rem;
    }
    .login-title {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ash-3);
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ash-3);
      margin-bottom: 0.4rem;
    }
    .form-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.5rem;
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--ash);
      color: var(--ash-3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: rgba(139,0,0,0.3);
      border-color: var(--blood-2);
      color: var(--parchment-2);
    }
    .form-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--ash-2);
    }
    #error-msg {
      display: none;
      background: rgba(139,0,0,0.2);
      border: 1px solid var(--blood);
      border-radius: var(--radius-sm);
      padding: 0.65rem 1rem;
      color: #e07070;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    #success-msg {
      display: none;
      background: rgba(0,80,0,0.2);
      border: 1px solid #3a7a3a;
      border-radius: var(--radius-sm);
      padding: 0.65rem 1rem;
      color: #80c880;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body data-page="login">

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">The Grimoire</div>
      <div class="login-title">Enter your credentials</div>

      <div class="form-row">
        <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <div id="error-msg"></div>
      <div id="success-msg"></div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="grimoire-input" type="email" id="input-email" required placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="grimoire-input" type="password" id="input-password" required placeholder="••••••••" minlength="6"/>
        </div>
        <div class="form-group" id="invite-group" style="display:none">
          <label class="form-label">Invite Code <span style="color:var(--ash-2)">(from your DM)</span></label>
          <input class="grimoire-input" type="text" id="input-invite" placeholder="e.g. GRIMOIRE2025"/>
        </div>
        <button type="submit" class="btn btn-blood" style="width:100%;justify-content:center" id="submit-btn">
          Enter the Grimoire
        </button>
      </form>

      <div class="form-footer">
        <a href="../index.html">← Back to the homepage</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initNav } from '../js/nav.js';
    import { supabase, getSession } from '../js/supabase.js';

    initNav();

    // Redirect if already logged in
    const session = await getSession();
    if (session) window.location.href = '../index.html';

    let mode = 'signin';

    window.switchTab = function(tab) {
      mode = tab;
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('invite-group').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('submit-btn').textContent =
        tab === 'signin' ? 'Enter the Grimoire' : 'Claim Your Seat';
      clearMessages();
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
    }
    function clearMessages() {
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }

    window.handleAuth = async function(e) {
      e.preventDefault();
      clearMessages();
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      const invite   = document.getElementById('input-invite').value.trim().toUpperCase();
      const btn      = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = '…';

      if (mode === 'signin') {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          showError(error.message);
          btn.disabled = false;
          btn.textContent = 'Enter the Grimoire';
        } else {
          window.location.href = '../index.html';
        }
      } else {
        // Check invite code against Supabase
        const DM_CODE = 'DUNGEONDAMIAN'; // Change this or pull from Supabase
        const PLAYER_CODE = 'PLAYER-1';  // Change or pull from Supabase

        let role = null;
        if (invite === DM_CODE) role = 'dm';
        else if (invite === PLAYER_CODE) role = 'player';
        else {
          showError('Invalid invite code. Ask your DM for the current code.');
          btn.disabled = false;
          btn.textContent = 'Claim Your Seat';
          return;
        }

        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          showError(error.message);
        } else {
          // Save role to profiles table
          if (data.user) {
            await supabase.from('profiles').upsert({ id: data.user.id, role, email });
          }
          showSuccess('Account created! Check your email to confirm, then sign in.');
        }
        btn.disabled = false;
        btn.textContent = 'Claim Your Seat';
      }
    };
  </script>

</body>
</html>
